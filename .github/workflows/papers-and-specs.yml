name: 📝 Papers & Specs
jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment:
      name: github-pages
    steps:
    - name: Checkout
      uses: actions/checkout@v6.0.1
    - name: Build Papers Mock
      run: echo 'Mocking build papers to trigger downstream workflow_run/check_run events'
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  workflow_dispatch: null
  push:
    branches:
    - master
  pull_request:
    paths:
    - doc
    - '!doc/docusaurus/**'
